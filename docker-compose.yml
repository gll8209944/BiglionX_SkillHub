version: '3.8'

services:
  web:
    image: skillhub-web:latest
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      # 运行时 URL / Cookie / OAuth（服务端 OAuth 优先读 NEXTAUTH_URL）
      - NEXTAUTH_URL
      - NEXT_PUBLIC_APP_URL
      - SESSION_COOKIE_SECURE
      - SESSION_COOKIE_SAMESITE
      - GITHUB_CLIENT_ID
      - GITHUB_CLIENT_SECRET
      - SESSION_SECRET
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis-data:
