version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://skillhub:${POSTGRES_PASSWORD:-ChangeMe_InProduction_2026!}@db:5432/skillhub
      - REDIS_URL=redis://redis:6379
      # GitHub OAuth 和 Session 所需环境变量（从 .env.production 读取）
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - SKILLHUB_OIDC_CLIENT_ID=${SKILLHUB_OIDC_CLIENT_ID:-skillhub-web}
      - SKILLHUB_OIDC_DISCOVERY_URL=${SKILLHUB_OIDC_DISCOVERY_URL:-https://account.proclaw.cc/.well-known/openid-configuration}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=skillhub
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ChangeMe_InProduction_2026!}
      - POSTGRES_DB=skillhub
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
