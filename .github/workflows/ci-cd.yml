name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # 单元测试和集成测试
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: skillhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd apps/web && npm ci

      - name: Run linting
        run: |
          cd apps/web
          npm run lint

      - name: Run unit tests
        run: |
          cd apps/web
          npm run test:coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/skillhub_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./apps/web/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  # E2E 测试
  e2e-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: skillhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd apps/web && npm ci

      - name: Database setup
        run: |
          cd apps/web
          npx prisma generate
          npx prisma db push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/skillhub_test

      - name: Build application
        run: |
          cd apps/web
          npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/skillhub_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Run E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: apps/web
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/skillhub_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload E2E screenshots
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-screenshots
          path: apps/web/cypress/screenshots

      - name: Upload E2E videos
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-videos
          path: apps/web/cypress/videos

  # 构建和部署准备
  build:
    runs-on: ubuntu-latest
    needs: [test, e2e-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd apps/web && npm ci

      - name: Build web application
        run: |
          cd apps/web
          npm run build
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/skillhub
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://skillhub.example.com

      - name: Build CLI application
        run: |
          cd apps/cli
          npm run build

      - name: Create deployment artifacts
        run: |
          mkdir -p deploy
          cp -r apps/web/.next deploy/web
          cp -r apps/cli/dist deploy/cli
          cp docker-compose.yml deploy/
          cp .env.production.example deploy/.env.production

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v3
        with:
          name: deployment-artifacts
          path: deploy/

  # 安全扫描
  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --production
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # 代码质量检查
  quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,md}"
        continue-on-error: true

      - name: Run ESLint
        run: npx eslint "**/*.{ts,tsx,js,jsx}" --max-warnings=0
        continue-on-error: true

  # 通知
  notify:
    runs-on: ubuntu-latest
    needs: [test, e2e-test, build, security, quality]
    if: always()
    
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.25.0
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          payload: |
            {
              "text": "SkillHub CI/CD Pipeline Status: ${{ needs.test.result == 'success' && needs.e2e-test.result == 'success' && needs.build.result == 'success' && '✅ SUCCESS' || '❌ FAILED' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*SkillHub CI/CD Pipeline*\nStatus: ${{ needs.test.result == 'success' && needs.e2e-test.result == 'success' && needs.build.result == 'success' && '✅ SUCCESS' || '❌ FAILED' }}\nBranch: `${{ github.ref_name }}`\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}